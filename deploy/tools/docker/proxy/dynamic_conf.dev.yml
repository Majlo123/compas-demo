http:
  routers:
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints: [ "web" ]
      priority: 1

    backend:
      rule: "PathPrefix(`/api`) || PathPrefix(`/docs`)"
      service: backend
      entryPoints: [ "web" ]
      priority: 2

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:5173"
    backend:
      loadBalancer:
        servers:
          - url: "http://backend:3000"