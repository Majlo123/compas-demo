services:
  frontend:
    container_name: compas-demo-frontend
    build:
      context: .
      dockerfile: deploy/tools/docker/frontend/Dockerfile
    image: template-frontend
    entrypoint: /frontend/entrypoint.sh
    env_file:
      - deploy/tools/env/frontend.dev.env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./deploy/frontend/node_modules:/frontend/node_modules
      - ./deploy/frontend/src:/frontend/src
      - ./deploy/shared:/shared
      - ./deploy/frontend/index.html:/frontend/index.html
      - ./deploy/frontend/tailwind.config.js:/frontend/tailwind.config.js
      - ./deploy/frontend/public:/frontend/public
    networks:
      - local_net

  backend:
    container_name: compas-demo-backend
    build:
      context: .
      dockerfile: deploy/tools/docker/backend/Dockerfile
    image: template-backend
    entrypoint: /backend/entrypoint.sh
    env_file:
      - deploy/tools/env/backend.dev.env
    ports:
      - 3000:3000
    volumes:
      - ./deploy/backend/node_modules:/backend/node_modules
      - ./deploy/backend/src:/backend/src
    depends_on:
      database:
        condition: service_started
    networks:
      - local_net

  database:
    container_name: compas-demo-database
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: vt_user
      POSTGRES_PASSWORD: vt_password
      POSTGRES_DB: compas-demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - local_net

  proxy:
    image: traefik:v3.1.2
    container_name: compas-demo-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/tools/docker/proxy/traefik.dev.yml:/etc/traefik/traefik.yml
      - ./deploy/tools/docker/proxy/dynamic_conf.dev.yml:/etc/traefik/dynamic_conf.yml
    networks:
      - local_net
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"

networks:
  local_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
