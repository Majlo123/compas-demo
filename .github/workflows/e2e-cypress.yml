name: E2E Cypress Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI env files
        run: |
          mkdir -p deploy/tools/env
          echo "${{ vars.CY_FRONTEND_ENV }}" > deploy/tools/env/frontend.dev.env
          echo "${{ vars.CY_BACKEND_ENV }}" > deploy/tools/env/backend.dev.env

      - name: Run application stack and Cypress
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.cypress.yml \
            up \
            --abort-on-container-exit \
            --exit-code-from cypress

      - name: Collect Docker logs
        if: failure()
        run: |
          mkdir -p docker-logs

          docker ps -a > docker-logs/ps.txt
          docker logs compas-demo-frontend > docker-logs/frontend.log 2>&1 || true
          docker logs compas-demo-backend > docker-logs/backend.log 2>&1 || true
          docker logs compas-demo-cypress-1 > docker-logs/cypress.log 2>&1 || true
          docker logs compas-demo-proxy > docker-logs/proxy.log 2>&1 || true

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Stop stack and cleanup
        if: always()
        run: |
          docker compose down -v

     
