name: E2E Cypress Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI env files
        run: |
          mkdir -p deploy/tools/env
          echo "${{ vars.CY_FRONTEND_ENV }}" > deploy/tools/env/frontend.dev.env
          echo "${{ vars.CY_BACKEND_ENV }}" > deploy/tools/env/backend.dev.env

      - name: Start application stack
        run: docker compose up -d

      - name: Install Cypress dependencies
        run: docker compose -f docker-compose.yml -f docker-compose.cypress.yml run --rm cypress npm ci

      - name: Run Cypress tests
        run: docker compose -f docker-compose.yml -f docker-compose.cypress.yml run --rm cypress

      - name: Stop stack and cleanup
        if: always()
        run: docker compose down -v
